set-option -sg escape-time 10
set-option -g focus-events on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ',xterm-ghostty:Tc'

set -g prefix ^Y
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set-option -g mouse off
set-option -g status-position bottom
setw -g automatic-rename on
setw -g mode-keys vi

set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h resize-pane -L 5
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 5

bind N command-prompt -p "New session name:" "new-session -s '%%'"
bind o switch-client -l  # toggle last session
bind i switch-client -l  # idem — espelha ctrl-o/ctrl-i do nvim
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

source-file ~/.config/tmux/themes/gruvbox-material-dark.conf

set-environment -g TMUX_PLUGIN_MANAGER_PATH '/home/tamer/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'

set -g @sessionx-bind 's'
set -g @sessionx-window-height '50%'
set -g @sessionx-window-width '70%'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-filter-current 'false'

run '/home/tamer/.config/tmux/plugins/tpm/tpm'
