# Gruvbox Material Dark
$bg      = rgb(282828)
$bg0     = rgb(32302f)
$bg1     = rgb(3c3836)
$fg      = rgb(d4be98)
$red     = rgb(ea6962)
$yellow  = rgb(d8a657)
$blue    = rgb(7daea3)
$purple  = rgb(d3869b)

general {
    disable_loading_bar = false
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = $blue
    inner_color = $bg1
    font_color = $fg
    fade_on_empty = true
    placeholder_text = <span foreground="##d4be98">Senha...</span>
    hide_input = false
    check_color = $yellow
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $fg
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:18000000] echo "$(date +"%A, %d %B")"
    color = $fg
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
